name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to package and publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

env:
  BIN_NAME: test-runner
  CARGO_TERM_COLOR: always

jobs:
  metadata:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}

    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

  verify:
    name: Verify release inputs
    needs: metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.metadata.outputs.release_tag }}

      - name: Confirm release tag exists
        run: git rev-parse --verify "refs/tags/${{ needs.metadata.outputs.release_tag }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build -p test-runner --locked

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install docs dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

  build:
    name: Build ${{ matrix.target }}
    needs:
      - metadata
      - verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.metadata.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p test-runner

      - name: Package release archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.metadata.outputs.release_tag }}
        run: |
          set -euo pipefail

          archive_name="${BIN_NAME}-${VERSION}-${TARGET}"
          staging_root="$(mktemp -d)"
          staging_dir="${staging_root}/${archive_name}"

          mkdir -p "${staging_dir}" dist
          cp "target/${TARGET}/release/${BIN_NAME}" "${staging_dir}/"
          cp README.md "${staging_dir}/"

          tar -C "${staging_root}" -czf "dist/${archive_name}.tar.gz" "${archive_name}"
          shasum -a 256 "dist/${archive_name}.tar.gz" > "dist/${archive_name}.tar.gz.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.metadata.outputs.release_tag }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --title "${RELEASE_TAG}" \
              --verify-tag \
              --generate-notes
          fi
