name: workflow create order after login
api: workflow/order/create-after-login
tags:
  - workflow
  - order
  - redis
vars:
  buyer_email: smoke.register@example.com
  access_token: workflow-standalone-token
  seed_token: true
setup:
  - if: "${seed_token == true}"
    then:
      - redis:
          datasource: redis.main
          command: SETEX
          args:
            - "auth:token:{{ access_token }}"
            - 3600
            - "{{ buyer_email }}"
steps:
  - query_redis:
      datasource: redis.main
      command: GET
      args:
        - "auth:token:{{ access_token }}"
    assert:
      - eq: ["result.value", "buyer_email"]
  - request:
      api: workflow/order/create-after-login
      base_url: "${env.variables.service_base_url}"
      body:
        customer:
          name: Workflow Order Runner
          email: "{{ buyer_email }}"
          tier: vip
        items:
          - sku: SKU-BOOK
            quantity: 1
            unit_price: 4500
        note: "{{ access_token }}"
    extract:
      order_id: response.json.order_id
      order_version: response.json.version
      normalized_email: response.json.customer.email
      note_value: response.json.metadata.note
    assert:
      - eq: ["response.status", 201]
      - not_empty: ["order_id"]
      - eq: ["order_version", 1]
      - eq: ["normalized_email", "buyer_email"]
      - eq: ["note_value", "access_token"]
teardown:
  - if: "${seed_token == true}"
    then:
      - redis:
          datasource: redis.main
          command: DEL
          args:
            - "auth:token:{{ access_token }}"
