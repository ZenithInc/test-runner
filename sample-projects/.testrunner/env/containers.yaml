name: containers
base_url: http://127.0.0.1:18080
headers:
  x-test-env: containers
variables:
  service_base_url: http://127.0.0.1:18080
  sms_provider_base_url: http://host.docker.internal:18081
  payment_provider_base_url: http://host.docker.internal:18081

# Testcontainers 模式：通过 Docker API 直接管理容器，无需 docker-compose.yml
runtime:
  kind: containers
  parallel:
    slots: 4
  services:
    - name: mysql
      image: mysql:8.4
      ports:
        - "13306:3306"
      env:
        MYSQL_DATABASE: app
        MYSQL_USER: app
        MYSQL_PASSWORD: app
        MYSQL_ROOT_PASSWORD: root
      command:
        - --general_log=1
        - --general_log_file=/var/lib/mysql/general.log
        - --slow_query_log=1
        - --slow_query_log_file=/var/lib/mysql/slow.log
        - --long_query_time=0
        - --log_output=FILE
      wait_for:
        kind: log_message
        pattern: "ready for connections.*port: 3306"
        timeout_ms: 60000

    - name: redis
      image: redis:7.2-alpine
      ports:
        - "16379:6379"
      command: ["redis-server", "--save", "", "--appendonly", "no"]
      wait_for:
        kind: tcp
        port: 6379
        timeout_ms: 15000
        interval_ms: 500

    # app 服务 — 自动从 Dockerfile 构建镜像
    - name: app
      build:
        context: .
      ports:
        - "18080:3000"
      env:
        DATABASE_URL: "mysql://app:app@mysql:3306/app"
        REDIS_URL: "redis://redis:6379/0"
        JWT_SECRET: sample-development-secret
        HOST: "0.0.0.0"
        PORT: "3000"
      extra_hosts:
        - "host.docker.internal:host-gateway"
      wait_for:
        kind: http
        port: 3000
        path: /health
        timeout_ms: 30000
        interval_ms: 1000

  cleanup: always

readiness:
  - kind: http
    url: "{{ env.variables.service_base_url }}/health"
    expect_status: 200
    timeout_ms: 60000
    interval_ms: 1000
  - kind: tcp
    host: 127.0.0.1
    port: 13306
    timeout_ms: 60000
    interval_ms: 1000

logs:
  - kind: compose_service
    service: app
    output: env/app.log
  - kind: compose_service
    service: mysql
    output: env/mysql.log
  - kind: compose_service
    service: redis
    output: env/redis.log
